name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          package-manager-cache: false
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm test

  pyarrow:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.0
          package-manager-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: npm install
      - run: python -m pip install -r test/pyarrow/requirements.txt
      - run: npm run build
      - run: npm run test:pyarrow
